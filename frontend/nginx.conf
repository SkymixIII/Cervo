# Sert le build Vite (SPA) et proxifie /api vers le backend (service `app`,
# port interne 8000, non publié côté hôte). Origine unique pour le navigateur
# (V1 = pas de CORS, cf. frontend/README.md).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://app:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (/api/jobs/{id}/events) : flux longs, pas de buffering nginx
        # (le backend envoie déjà X-Accel-Buffering: no, on le renforce ici).
        # Preview vidéo (/api/jobs/{id}/preview) : Range/206 traversent tels
        # quels un reverse proxy sans buffering.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        try_files $uri /index.html;
    }
}
